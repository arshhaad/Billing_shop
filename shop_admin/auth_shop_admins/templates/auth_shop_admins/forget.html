<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBilling Admin | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            width: 600px; height: 600px;
            top: -200px; left: -150px;
            background: radial-gradient(circle, rgba(129,140,248,0.12) 0%, transparent 65%);
            filter: blur(60px);
        }
        .glow-2 {
            width: 500px; height: 500px;
            bottom: -180px; right: -120px;
            background: radial-gradient(circle, rgba(192,132,252,0.10) 0%, transparent 65%);
            filter: blur(60px);
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 48px 44px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-wrap .brand {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo-wrap .subtitle {
            font-size: 0.875rem;
            font-weight: 500;
            color: #6B7280;
        }

        .messages-wrap { margin-bottom: 20px; }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alert-error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; }
        .alert-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #6EE7B7; }
        .alert-info    { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: #A5B4FC; }
        .alert-warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); color: #FCD34D; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #F1F5F9;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .form-group input::placeholder { color: #4B5563; }
        .form-group input:focus {
            border-color: rgba(129,140,248,0.6);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366F1, #A855F7);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 0.975rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.35);
            margin-bottom: 20px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.5);
        }
        .btn-submit:active { transform: translateY(0); }

        .back-link {
            display: block;
            text-align: center;
            font-size: 0.875rem;
            color: #818CF8;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #C084FC; }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="brand">eBilling Admin</div>
            <div class="subtitle">Reset admin password</div>
        </div>

        {% if messages %}
        <div class="messages-wrap">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'auth_shop_admins:forget' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Admin Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="admin@example.com"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">Reset Password</button>
        </form>

        <a href="{% url 'auth_shop_admins:login' %}" class="back-link">← Back to Sign In</a>
    </div>

</body>
</html>
