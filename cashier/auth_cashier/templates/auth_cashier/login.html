<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Login | Billing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #34d399;
            --primary-hover: #10b981;
            --bg-gradient: #022c22;
            --bg-dark: #021a14;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --input-bg: rgba(2, 26, 20, 0.5);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 10% 20%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Ambient Cinematic Glow elements */
        .glow-sphere {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.25) 0%, rgba(52, 211, 153, 0.1) 60%, transparent 100%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: floatGlow 10s infinite alternate;
        }

        .glow-sphere-1 {
            top: 20%;
            left: 25%;
        }

        .glow-sphere-2 {
            bottom: 20%;
            right: 25%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, rgba(16, 185, 129, 0.1) 60%, transparent 100%);
            animation-delay: -5s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.15); }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 45px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-section h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a7f3d0 0%, #34d399 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.2px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px 18px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(52, 211, 153, 0.6);
            box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.6), 0 0 20px rgba(52, 211, 153, 0.15);
            background: rgba(2, 26, 20, 0.7);
        }

        .helper-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .helper-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .helper-links a:hover {
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.35);
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.5), 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .messages {
            margin-bottom: 20px;
            border-radius: 14px;
            font-size: 0.9rem;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <!-- Cinematic Glowing Background Spheres -->
    <div class="glow-sphere glow-sphere-1"></div>
    <div class="glow-sphere glow-sphere-2"></div>

    <div class="login-container">
        <div class="logo-section">
            <h1>Cashier Portal</h1>
            <p>Sign in to access the checkout system</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'auth_cashier:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="cashier_id">Cashier ID</label>
                <input type="text" id="cashier_id" name="cashier_id" class="form-input" placeholder="e.g. cashier_01" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="helper-links">
                <div>
                    <span style="color: var(--text-secondary)">Forgot credentials?</span>
                    <a href="{% url 'auth_cashier:forget' %}">Reset here</a>
                </div>
            </div>

            <button type="submit" class="btn-submit">Launch Checkout</button>
        </form>

        <div class="divider"></div>

        <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary)">
            Are you a Shop Admin? <a href="{% url 'auth_shop_admins:login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 4px;">Go to Admin Panel</a>
        </div>
    </div>

</body>
</html>
