<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBilling | Reset Cashier Password</title>
    {% load static %}
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicons/favicon.svg' %}">
    <link rel="alternate icon" href="{% static 'img/favicons/favicon-32x32.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/favicons/apple-touch-icon.svg' %}">
    <link rel="manifest" href="{% static 'img/favicons/manifest.json' %}">
    <meta name="theme-color" content="#2563EB">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.10) 0%, transparent 70%);
            top: -120px; left: -120px;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(14,165,233,0.09) 0%, transparent 70%);
            bottom: -100px; right: -80px;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(37,99,235,0.06);
            padding: 48px 44px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-wrap .brand {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #2563EB, #0EA5E9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo-wrap .subtitle {
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748B;
        }

        .messages-wrap { margin-bottom: 20px; }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alert-error   { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; }
        .alert-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #16A34A; }
        .alert-info    { background: #EFF6FF; border: 1px solid #BFDBFE; color: #2563EB; }
        .alert-warning { background: #FFFBEB; border: 1px solid #FDE68A; color: #D97706; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: #F1F5F9;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #1E293B;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .form-group input::placeholder { color: #94A3B8; }
        .form-group input:focus {
            border-color: #2563EB;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563EB, #0EA5E9);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 0.975rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 18px rgba(37,99,235,0.28);
            margin-bottom: 20px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37,99,235,0.38);
        }
        .btn-submit:active { transform: translateY(0); }

        .back-link {
            display: block;
            text-align: center;
            font-size: 0.875rem;
            color: #2563EB;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #1D4ED8; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="brand">eBilling</div>
            <div class="subtitle">Reset your password</div>
        </div>

        {% if messages %}
        <div class="messages-wrap">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'auth_cashier:forget' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="cashier_id">Cashier ID</label>
                <input
                    type="text"
                    id="cashier_id"
                    name="cashier_id"
                    placeholder="e.g. cashier_01"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">Reset Password</button>
        </form>

        <a href="{% url 'auth_cashier:login' %}" class="back-link">← Back to Sign In</a>
    </div>

</body>
</html>
