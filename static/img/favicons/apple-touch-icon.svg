<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="50%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E3A8A" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="180" height="90" rx="40" fill="url(#shine)"/>

  <!-- Receipt paper -->
  <rect x="44" y="32" width="92" height="116" rx="10" fill="#FFFFFF" opacity="0.97"/>
  <!-- Top header bar -->
  <rect x="44" y="32" width="92" height="30" rx="10" fill="#3B82F6"/>
  <rect x="44" y="50" width="92" height="12" fill="#3B82F6"/>

  <!-- eBilling text in header -->
  <text x="90" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">eBilling</text>

  <!-- Line items -->
  <rect x="56" y="74" width="40" height="7" rx="3.5" fill="#CBD5E1"/>
  <rect x="56" y="87" width="60" height="7" rx="3.5" fill="#CBD5E1"/>
  <rect x="56" y="100" width="30" height="7" rx="3.5" fill="#CBD5E1"/>

  <!-- Divider -->
  <rect x="56" y="114" width="68" height="1.5" fill="#E2E8F0"/>

  <!-- Total row -->
  <text x="56"  y="130" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">Total</text>
  <text x="136" y="130" text-anchor="end" font-family="Arial,sans-serif" font-size="13" font-weight="900" fill="#2563EB">₹</text>
</svg>
