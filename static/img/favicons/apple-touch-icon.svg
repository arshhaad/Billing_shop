<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#bg)"/>
  
  <!-- Main Invoice -->
  <g filter="url(#shadow)">
    <rect x="35" y="30" width="110" height="120" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="35" y="30" width="110" height="25" rx="8" fill="url(#accent)"/>
  </g>
  
  <!-- Header Text -->
  <text x="90" y="48" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">eBilling</text>
  
  <!-- Content Lines -->
  <rect x="45" y="70" width="60" height="4" rx="2" fill="#64748B"/>
  <rect x="45" y="80" width="80" height="4" rx="2" fill="#64748B"/>
  <rect x="45" y="90" width="50" height="4" rx="2" fill="#64748B"/>
  <rect x="45" y="100" width="70" height="4" rx="2" fill="#64748B"/>
  <rect x="45" y="110" width="40" height="4" rx="2" fill="#64748B"/>
  
  <!-- Separator Line -->
  <line x1="45" y1="125" x2="135" y2="125" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Total Amount -->
  <text x="135" y="140" text-anchor="end" font-family="Arial" font-size="20" font-weight="bold" fill="url(#accent)">₹999</text>
  
  <!-- POS Icon -->
  <circle cx="150" cy="150" r="12" fill="url(#accent)" opacity="0.9"/>
  <rect x="144" y="144" width="12" height="8" rx="1" fill="#FFFFFF"/>
  <circle cx="148" cy="154" r="1.5" fill="#FFFFFF"/>
  <circle cx="152" cy="154" r="1.5" fill="#FFFFFF"/>
</svg>