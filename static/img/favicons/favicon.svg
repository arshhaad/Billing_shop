<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#1E3A8A" stroke-width="2"/>
  
  <!-- Invoice Icon -->
  <rect x="8" y="7" width="16" height="18" rx="2" fill="#FFFFFF" opacity="0.95"/>
  <rect x="8" y="7" width="16" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Text Lines -->
  <rect x="10" y="13" width="8" height="1.5" rx="0.75" fill="#64748B"/>
  <rect x="10" y="16" width="10" height="1.5" rx="0.75" fill="#64748B"/>
  <rect x="10" y="19" width="6" height="1.5" rx="0.75" fill="#64748B"/>
  
  <!-- Currency Symbol -->
  <text x="20" y="23" font-family="Arial" font-size="8" font-weight="bold" fill="url(#accent)">₹</text>
</svg>